name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata
        run: npm run verify:release -- source

      - name: Run tests
        run: npm test

      - name: Build installer
        env:
          VAANI_GATEWAY_URL: ${{ secrets.VAANI_GATEWAY_URL }}
          VAANI_GATEWAY_ACCESS_KEY: ${{ secrets.VAANI_GATEWAY_ACCESS_KEY }}
        run: npm run dist

      - name: Verify updater artifacts
        run: npm run verify:release -- artifacts

      - name: Publish release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $v = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "v$v"
          Copy-Item "dist/Vaani-Setup-$v.exe" "dist/Vaani-Setup.exe"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            # Keep a new release invisible to auto-updaters until every asset is present.
            gh release create $tag --title "Vaani $v" --generate-notes --draft
          }
          gh release upload $tag "dist/Vaani-Setup-$v.exe" "dist/Vaani-Setup.exe" "dist/Vaani-Setup-$v.exe.blockmap" "dist/latest.yml" --clobber
          gh release edit $tag --title "Vaani $v" --draft=false --latest
