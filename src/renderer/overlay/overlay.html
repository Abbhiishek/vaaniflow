<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'" />
  <link rel="stylesheet" href="overlay.css" />
</head>
<body>
  <div id="stage">
    <div id="caption" hidden></div>
    <div id="pill" class="state-idle">
      <!-- idle: tiny bar that grows on hover -->
      <div id="idle-content">
        <svg id="mic-icon" viewBox="0 0 24 24" width="16" height="16">
          <path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/>
        </svg>
        <span id="idle-label">Start dictating</span>
      </div>

      <!-- recording -->
      <div id="rec-content">
        <button id="btn-cancel" title="Cancel (Esc)">
          <svg viewBox="0 0 24 24" width="13" height="13"><path fill="currentColor" d="M19 6.4 17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12z"/></svg>
        </button>
        <canvas id="wave" width="440" height="64"></canvas>
        <span id="timer">0:00</span>
        <button id="btn-stop" title="Done (Space)">
          <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>
        </button>
      </div>

      <!-- processing / done / error -->
      <div id="msg-content">
        <span id="msg-dots"><i></i><i></i><i></i></span>
        <span id="msg-text">Transcribing…</span>
      </div>
    </div>
  </div>
  <script src="overlay.js"></script>
</body>
</html>
